<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f1f5f0;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:13px;color:#111827}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:220px;flex-shrink:0;background:#0d1f12;display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:1.1rem 1rem;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.lo-name{color:#fff;font-size:16px;font-weight:600;letter-spacing:-.3px}
.lo-sub{color:rgba(255,255,255,.3);font-size:9px;text-transform:uppercase;letter-spacing:1.2px;margin-top:3px}
.snav{padding:.5rem 0;flex:1}
.nsec{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.28);padding:.9rem 1rem .3rem}
.ni{display:flex;align-items:center;gap:9px;padding:9px 1rem;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;border-left:2.5px solid transparent;transition:all .1s;user-select:none}
.ni:hover{color:rgba(255,255,255,.82);background:rgba(255,255,255,.04)}
.ni.on{color:#fff;background:rgba(74,222,128,.13);border-left-color:#4ade80}
.ni i{font-size:15px;width:18px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:9px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);padding:2px 6px;border-radius:20px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:50px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;flex-shrink:0}
.tb-tit{font-size:14px;font-weight:600;color:#111827}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-dt{font-size:11px;color:#9ca3af;font-family:'IBM Plex Mono',monospace}
#content{flex:1;overflow-y:auto;padding:1.2rem 1.5rem;background:#f1f5f0}

/* CARDS */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.9rem}
.card:last-child{margin-bottom:0}
.ch{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:#9ca3af;margin-bottom:.9rem}

/* CAT TABS */
.cat-tabs{display:flex;gap:6px;margin-bottom:.9rem;flex-wrap:wrap}
button.ct{padding:5px 14px;border-radius:20px;border:1px solid #e5e7eb;font-size:12px;cursor:pointer;color:#6b7280;background:#fff;font-family:inherit;transition:all .1s}
button.ct:hover{border-color:#86efac;background:#f0fdf4;color:#15803d}
button.ct.on{background:#f0fdf4;border-color:#16a34a;color:#15803d;font-weight:500}

/* PRINT BUTTONS */
.pbgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;margin-bottom:.9rem}
.pb{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .12s;user-select:none}
.pb:hover,.pb.on{border-color:#16a34a;background:#f0fdf4}
.pb i{font-size:22px;color:#6b7280;display:block;margin-bottom:6px;transition:color .12s}
.pb.on i{color:#16a34a}
.pb-lbl{font-size:11px;font-weight:500;color:#374151;line-height:1.3}

/* PRINT RESULT */
.result{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:1.2rem}
.res-name{font-size:16px;font-weight:600;color:#15803d;margin-bottom:1rem}
.specs{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:1rem}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:4px}
.sv{font-size:14px;font-weight:500;font-family:'IBM Plex Mono',monospace;color:#111827;line-height:1.4}
.sv.plain{font-family:'IBM Plex Sans',sans-serif;font-size:12px}
.dbox{background:#fff;border:1px solid #bbf7d0;border-radius:7px;padding:10px 12px;margin-bottom:8px}
.dlbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:4px}
.dval{font-size:12px;color:#374151;line-height:1.6}
.rnote{font-size:12px;color:#166534;background:#dcfce7;padding:9px 12px;border-radius:7px;line-height:1.6}
.empty{padding:3rem 2rem;text-align:center;background:#f9fafb;border-radius:10px;border:1px dashed #e5e7eb;color:#9ca3af}
.empty i{font-size:30px;display:block;margin-bottom:10px}

/* PORTALS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
a.plink{display:block;padding:11px 13px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;text-decoration:none;transition:all .12s}
a.plink:hover{background:#eff6ff;border-color:#93c5fd}
.pl-name{font-size:13px;font-weight:500;color:#111827;margin-bottom:2px}
.pl-url{font-size:10px;color:#9ca3af;font-family:'IBM Plex Mono',monospace}
.pl-desc{font-size:11px;color:#9ca3af;margin-top:3px}

/* CHECKLISTS */
.clf{background:#fff;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;overflow:hidden}
.clf-h{display:flex;align-items:center;gap:10px;padding:.9rem 1.2rem;cursor:pointer;user-select:none}
.clf-title{font-size:13px;font-weight:500;color:#111827;flex:1;line-height:1.4}
.clf-meta{font-size:11px;color:#9ca3af;margin-top:2px}
.prog{font-size:11px;background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
.cl-items{padding:.8rem 1.2rem;border-top:1px solid #f3f4f6;display:flex;flex-direction:column;gap:6px}
.ci{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;background:#f9fafb;border-radius:6px;cursor:pointer;transition:background .1s}
.ci:hover{background:#f3f4f6}
.ci.ck{background:#f0fdf4}
.cbox{width:18px;height:18px;border:1.5px solid #d1d5db;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff;transition:all .1s}
.cbox.ck{background:#16a34a;border-color:#16a34a}
.cl-text{font-size:12px;color:#374151;line-height:1.5}
.ci.ck .cl-text{color:#9ca3af;text-decoration:line-through}
button.rbtn{margin-top:10px;font-size:11px;padding:5px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;color:#9ca3af;cursor:pointer;font-family:inherit}
button.rbtn:hover{background:#f9fafb}

/* RATE CARD */
.rt{width:100%;border-collapse:collapse}
.rt th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;text-align:left;padding:6px 8px;border-bottom:1px solid #f3f4f6}
.rt td{padding:9px 8px;border-bottom:1px solid #fafafa;font-size:13px;color:#374151}
.rt tr:last-child td{border-bottom:none}
input.ri{border:none;background:transparent;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#374151;width:70px;text-align:right;padding:2px 5px;border-radius:4px}
input.ri:focus{outline:none;background:#f0fdf4}
button.gbtn{padding:7px 15px;border:1px solid #16a34a;border-radius:7px;background:#fff;color:#16a34a;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .1s}
button.gbtn.on{background:#f0fdf4}
button.gbtn:hover{background:#f0fdf4}

/* DASHBOARD */
.dqgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.dq{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 12px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .12s;user-select:none}
.dq:hover{border-color:#4ade80;background:#f0fdf0}
.dq.dim{opacity:.45;cursor:default;pointer-events:none}
.dq i{font-size:22px;color:#6b7280}
.dq-lbl{font-size:12px;font-weight:500;color:#374151}
.p2b{font-size:9px;background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:10px}
.hpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
a.hp{display:block;padding:10px 12px;border-radius:8px;text-decoration:none;border:1px solid;font-size:12px;font-weight:500;transition:opacity .12s}
a.hp:hover{opacity:.75}

/* COMING SOON */
.soon{padding:3.5rem 2rem;text-align:center;background:#f9fafb;border-radius:12px;border:1px dashed #e5e7eb}
.soon i{font-size:36px;color:#d1d5db;display:block;margin-bottom:12px}
.soon-title{font-size:16px;font-weight:500;color:#374151;margin-bottom:8px}
.soon-sub{font-size:13px;color:#9ca3af;max-width:300px;margin:0 auto;line-height:1.7}

/* RESPONSIVE */
@media(max-width:640px){
  .app{flex-direction:column;height:auto}
  .sb{width:100%;flex-direction:row;overflow-x:auto;overflow-y:hidden;height:auto}
  .logo{padding:.7rem 1rem;border-bottom:none;border-right:1px solid rgba(255,255,255,.07);flex-shrink:0}
  .lo-sub{display:none}
  .snav{display:flex;flex-direction:row;padding:.3rem 0;align-items:center}
  .nsec{display:none}
  .ni{padding:8px 12px;flex-direction:column;gap:3px;border-left:none;border-bottom:2.5px solid transparent;font-size:10px;flex-shrink:0}
  .ni.on{border-left:none;border-bottom-color:#4ade80}
  .ni i{font-size:18px;width:auto}
  .nbadge{display:none}
  .main{overflow:visible}
  #content{overflow:visible;padding:1rem}
}
</style>

var CL=[

  {id:'vot',n:'Voter ID — New Registration',cat:'Identity',items:['Aadhaar card','Age proof showing 18+ years','Address proof in the constituency','1 passport size photo','Fill Form 6 on voterportal.eci.gov.in','No fee for new voter registration']},
  {id:'dln',n:'Driving License — New (LL to DL)',cat:'Identity',items:['Aadhaar card as address proof','Age proof — minimum 18 years for LMV (16 for 50cc)','Medical certificate Form 1A from any MBBS doctor','2 passport photos','Apply online: sarathi.parivahan.gov.in','Fee: ₹200–500 depending on vehicle class','LL test slot booked online after submission']},
  {id:'esh',n:'e-Shram Card Registration',cat:'Central Schemes',items:['Aadhaar card with mobile number linked (mandatory)','Bank account number and IFSC code','Occupation: construction, domestic, farm, street vendor, etc.','Mobile number same as Aadhaar-linked number','Free registration — no fee','Portal: eshram.gov.in']},
];

var defaultRates=[
  {s:'Aadhaar print A4 (B&W)',r:20,c:'Printing'},{s:'Aadhaar card size + lamination',r:50,c:'Printing'},
  {s:'PAN card print + lamination',r:50,c:'Printing'},{s:'Photocopy A4 (B&W)',r:3,c:'Printing'},

  {s:'Print A4 (colour)',r:20,c:'Printing'},{s:'Passport photo — 2 photos',r:50,c:'Photo'},
  {s:'Passport photo — 4 photos',r:80,c:'Photo'},{s:'4R photo print',r:30,c:'Photo'},
  {s:'Scanning per page',r:10,c:'Scanning'},{s:'Lamination — card size',r:20,c:'Lamination'},
  {s:'Lamination — A4',r:40,c:'Lamination'},{s:'Lamination — A3',r:60,c:'Lamination'},

  {s:'Electricity bill payment charge',r:20,c:'Utility'},{s:'DTH recharge charge',r:10,c:'Utility'},
];
var rates;
try{rates=JSON.parse(localStorage.getItem('seva_rates'))||defaultRates;}catch(e){rates=defaultRates;}

// ---- TITLES ----
var TITLES={dash:'Dashboard',print:'Print Helper',checklists:'Document Checklists',portals:'Portal Quick-Launch',rates:'Service Rate Card',customers:'Customer Log',income:'Income Tracker',wa:'WhatsApp Templates',supplies:'Supplies Tracker',mis:'MIS Report',helplines:'Helplines'};

// ---- DATE ----
function setDate(){
  var d=new Date(),dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('tb-dt').textContent=dy[d.getDay()]+' '+d.getDate()+' '+mo[d.getMonth()]+' '+d.getFullYear();
}

// ---- NAVIGATION ----
function nav(s){
  document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('on',n.dataset.s===s);});
  document.getElementById('tb-tit').textContent=TITLES[s]||s;
  var c=document.getElementById('content');
  var coming=['customers','income','wa','supplies','mis','helplines'];
  if(s==='dash')c.innerHTML=rDash();
  else if(s==='print')c.innerHTML=rPrint();
  else if(s==='checklists')c.innerHTML=rCL();
  else if(s==='portals')c.innerHTML=rPortals();
  else if(s==='rates')c.innerHTML=rRates();
  else if(coming.indexOf(s)>=0)c.innerHTML=rSoon(TITLES[s]);
  c.scrollTop=0;
}

// ---- DASHBOARD ----
function rDash(){
  var q=[{i:'ti-printer',l:'Print Helper',s:'print'},{i:'ti-checklist',l:'Checklists',s:'checklists'},{i:'ti-world',l:'Portal Links',s:'portals'},{i:'ti-receipt',l:'Rate Card',s:'rates'}];
  var dim=[{i:'ti-users',l:'Customer Log'},{i:'ti-coin',l:'Income'},{i:'ti-brand-whatsapp',l:'WA Templates'},{i:'ti-package',l:'Supplies'}];
  var hot=[{n:'Aaple Sarkar',u:'https://aaplesarkar.mahaonline.gov.in',c:'#92400e',b:'#fef3c7'},{n:'UIDAI Aadhaar',u:'https://uidai.gov.in',c:'#1e40af',b:'#dbeafe'},{n:'NSDL PAN',u:'https://tin.tin.nsdl.com',c:'#166534',b:'#dcfce7'},{n:'CSC DigiSeva',u:'https://digitalseva.csc.gov.in',c:'#581c87',b:'#f3e8ff'},{n:'Bhulekh 7/12',u:'https://bhulekh.mahabhumi.gov.in',c:'#92400e',b:'#fef3c7'},{n:'IRCTC',u:'https://irctc.co.in',c:'#155e75',b:'#cffafe'},{n:'Voter Portal',u:'https://voterportal.eci.gov.in',c:'#991b1b',b:'#fee2e2'},{n:'Parivahan DL',u:'https://sarathi.parivahan.gov.in',c:'#374151',b:'#f3f4f6'}];
  return '<div style="margin-bottom:1.25rem"><div style="font-size:20px;font-weight:600;color:#111827;margin-bottom:4px">Namaskar</div><div style="font-size:13px;color:#9ca3af">Sai Tilak Enterprises · Ambernath, Thane · Phase 1 live</div></div>'
    +'<div class="card"><div class="ch">Quick access</div><div class="dqgrid">'
    +q.map(function(x){return '<div class="dq" onclick="nav(\''+x.s+'\')"><i class="ti '+x.i+'" aria-hidden="true"></i><div class="dq-lbl">'+x.l+'</div></div>';}).join('')
    +dim.map(function(x){return '<div class="dq dim"><i class="ti '+x.i+'" aria-hidden="true"></i><div class="dq-lbl">'+x.l+'</div><div class="p2b">Phase 2</div></div>';}).join('')
    +'</div></div>'
    +'<div class="card"><div class="ch">Hot portals — one tap</div><div class="hpgrid">'
    +hot.map(function(h){return '<a class="hp" href="'+h.u+'" target="_blank" style="background:'+h.b+';color:'+h.c+';border-color:'+h.c+'44">'+h.n+'</a>';}).join('')
    +'</div></div>';
}

// ---- PRINT ----
function rPrint(){
  var cats=[];PI.forEach(function(p){if(cats.indexOf(p.c)<0)cats.push(p.c);});
  var items=PI.filter(function(p){return p.c===pcat;});
  var item=PI.filter(function(p){return p.id===psel;})[0];
  var h='<div class="card"><div class="cat-tabs">'+cats.map(function(c){return '<button class="ct'+(pcat===c?' on':'')+'" onclick="setPCat(\''+c+'\')">'+c+'</button>';}).join('')+'</div>'
    +'<div class="pbgrid">'+items.map(function(p){return '<div class="pb'+(psel===p.id?' on':'')+'" onclick="setPItem(\''+p.id+'\')"><i class="ti '+p.i+'" aria-hidden="true"></i><div class="pb-lbl">'+p.l+'</div></div>';}).join('')+'</div></div>';
  if(item){
    h+='<div class="result"><div class="res-name">'+item.l+'</div><div class="specs">'
      +'<div><div class="sl">Size (mm)</div><div class="sv">'+item.mm+'</div></div>'
      +'<div><div class="sl">Size (inches)</div><div class="sv">'+item.inch+'</div></div>'
      +'<div><div class="sl">Resolution</div><div class="sv">'+item.dpi+'</div></div>'
      +'<div><div class="sl">Paper type</div><div class="sv plain">'+item.paper+'</div></div>'
      +'<div><div class="sl">Per A4 sheet</div><div class="sv plain">'+item.a4+'</div></div>'
      +'<div><div class="sl">Lamination size</div><div class="sv plain">'+item.lami+'</div></div>'
      +'</div><div class="dbox"><div class="dlbl">Printer dialog setting</div><div class="dval">'+item.dialog+'</div></div>'
      +'<div class="rnote">'+item.note+'</div></div>';
  } else {
    h+='<div class="empty"><i class="ti ti-hand-click" aria-hidden="true"></i>Tap any document above to see exact print settings</div>';
  }
  return h;
}
function setPCat(c){pcat=c;psel=null;document.getElementById('content').innerHTML=rPrint();document.getElementById('content').scrollTop=0;}
function setPItem(id){psel=(psel===id)?null:id;document.getElementById('content').innerHTML=rPrint();}

// ---- PORTALS ----
function rPortals(){
  return PORTALS.map(function(g){
    return '<div class="card"><div class="ch" style="color:'+g.color+'">'+g.title+'</div><div class="pgrid">'
      +g.items.map(function(p){return '<a class="plink" href="'+p.u+'" target="_blank" rel="noopener"><div class="pl-name">'+p.n+'</div><div class="pl-url">'+p.u.replace('https://','')+' </div><div class="pl-desc">'+p.d+'</div></a>';}).join('')
      +'</div></div>';
  }).join('');
}

// ---- CHECKLISTS ----
function rCL(){
  return CL.map(function(cl){
    var done=cl.items.filter(function(_,i){return !!ticked[cl.id+'-'+i];}).length;
    var isOpen=openCL===cl.id;
    var h='<div class="clf"><div class="clf-h" onclick="togCL(\''+cl.id+'\')">'
      +'<div style="flex:1"><div class="clf-title">'+cl.n+'</div><div class="clf-meta">'+cl.cat+' · '+cl.items.length+' documents</div></div>'
      +(done>0?'<span class="prog">'+done+'/'+cl.items.length+'</span>':'')
      +'<i class="ti '+(isOpen?'ti-chevron-up':'ti-chevron-down')+'" style="color:#9ca3af;font-size:14px;margin-left:8px" aria-hidden="true"></i></div>';
    if(isOpen){
      h+='<div class="cl-items">';
      cl.items.forEach(function(item,i){
        var ck=!!ticked[cl.id+'-'+i];
        h+='<div class="ci'+(ck?' ck':'')+'" onclick="tickI(\''+cl.id+'\','+i+')">'
          +'<div class="cbox'+(ck?' ck':'')+'">'+( ck?'<i class="ti ti-check" style="font-size:10px;color:#fff" aria-hidden="true"></i>':'')+'</div>'
          +'<div class="cl-text">'+item+'</div></div>';
      });
      if(done>0)h+='<button class="rbtn" onclick="event.stopPropagation();resetCL(\''+cl.id+'\')">Reset checklist</button>';
      h+='</div>';
    }
    return h+'</div>';
  }).join('');
}
function togCL(id){openCL=(openCL===id)?null:id;document.getElementById('content').innerHTML=rCL();}
function tickI(lid,i){ticked[lid+'-'+i]=!ticked[lid+'-'+i];document.getElementById('content').innerHTML=rCL();}
function resetCL(lid){CL.filter(function(c){return c.id===lid;})[0].items.forEach(function(_,i){delete ticked[lid+'-'+i];});document.getElementById('content').innerHTML=rCL();}

// ---- RATE CARD ----
function rRates(){
  var cats=[];rates.forEach(function(r){if(cats.indexOf(r.c)<0)cats.push(r.c);});
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">'
    +'<div style="font-size:12px;color:#9ca3af">Tap any amount to edit. Auto-saved to this device.</div>'
    +'<button class="gbtn'+(editRates?' on':'')+'" onclick="togEdit()">'+(editRates?'Done editing':'Edit my rates')+'</button></div>';
  cats.forEach(function(cat){
    h+='<div class="card"><div class="ch">'+cat+'</div><table class="rt"><thead><tr><th>Service</th><th style="text-align:right">Your rate (₹)</th></tr></thead><tbody>';
    rates.forEach(function(r,i){
      if(r.c===cat){
        h+='<tr><td>'+r.s+'</td><td style="text-align:right">'
          +(editRates?'<input class="ri" type="number" value="'+r.r+'" onchange="updRate('+i+',this.value)">'
            :'<span style="font-family:\'IBM Plex Mono\',monospace;font-weight:500">₹'+r.r+'</span>')
          +'</td></tr>';
      }
    });
    h+='</tbody></table></div>';
  });
  return h;
}
function togEdit(){editRates=!editRates;document.getElementById('content').innerHTML=rRates();}
function updRate(i,v){rates[i]={s:rates[i].s,r:Number(v),c:rates[i].c};try{localStorage.setItem('seva_rates',JSON.stringify(rates));}catch(e){}}

// ---- COMING SOON ----
function rSoon(t){
  return '<div class="soon"><i class="ti ti-clock" aria-hidden="true"></i><div class="soon-title">'+t+' — coming in Phase 2</div><div class="soon-sub">Customer Log, Income Tracker, Receipt Generator, BC Commission Log, and WhatsApp Templates are next.</div></div>';
}

// ---- INIT ----
document.querySelectorAll('.ni').forEach(function(n){n.addEventListener('click',function(){nav(n.dataset.s);});});
setDate();
nav('dash');

// ---- SERVICE WORKER (PWA offline) ----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
